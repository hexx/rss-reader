<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RSS Reader Dashboard</title>
    <meta name="theme-color" content="#4f46e5" />
    <meta name="application-name" content="理想のRSSリーダー" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="理想のRSSリーダー" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__header">
          <h2>RSS Sources</h2>
          <p>購読サイトをクリックして絞り込みます。</p>
        </div>
        <form id="subscription-form" class="search-form subscription-form">
          <input
            id="subscription-input"
            name="siteUrl"
            type="url"
            placeholder="RSSのURLを追加"
            autocomplete="url"
            required
          />
          <button type="submit">追加</button>
        </form>
        <nav aria-label="RSS sources">
          <ul id="sources-list" class="sources-list"></ul>
        </nav>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div>
            <h1>RSS Reader</h1>
            <p>記事、要約、はてブコメントをひとまとめに閲覧します。</p>
          </div>
          <button id="sync-button" type="button">Sync</button>
        </header>

        <main class="layout">
          <section class="panel">
            <div class="search-toolbar">
              <form id="search-form" class="search-form">
                <input
                  id="search-input"
                  name="query"
                  type="search"
                  placeholder="記事を自然言語で検索"
                  autocomplete="off"
                />
                <button type="submit">Search</button>
              </form>
              <label class="search-filter">
                <input id="unread-only-toggle" type="checkbox" checked />
                未読のみ表示
              </label>
            </div>

            <section id="ai-answer-section" class="ai-answer" aria-live="polite" hidden>
              <h2>AIの回答</h2>
              <div id="ai-answer" class="ai-answer__text"></div>
            </section>

            <p id="status" class="status">読み込み中...</p>

            <div id="articles" class="cards"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="article-card-template">
      <article class="card">
        <header class="card__header">
            <div class="card__title-group">
              <a class="card__title" target="_blank" rel="noreferrer"></a>
              <div class="card__meta">
                <span class="card__source"></span>
                <span class="card__date"></span>
                <span class="card__url"></span>
              </div>
            </div>
          <button class="card__read-toggle" type="button"></button>
        </header>
        <section class="card__summary-section">
          <h3>記事の要約</h3>
          <div class="card__article-summary"></div>
        </section>
        <section class="card__summary-section card__summary-section--hatena">
          <h3>はてブの反応</h3>
          <div class="card__hatena-summary"></div>
        </section>
        <a class="card__article-link" target="_blank" rel="noreferrer">記事を読む</a>
        <div class="card__comments-heading">個別コメント</div>
        <ul class="comments"></ul>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
